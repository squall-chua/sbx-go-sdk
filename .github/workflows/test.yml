name: Build & Unit Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.25" # go.mod floor
          - "stable" # latest release

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Verify dependencies
        run: |
          go mod verify
          go mod download

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Unit tests only. The integration suite is guarded by `//go:build integration`
      # and needs a live sandboxd daemon, so it is intentionally excluded here
      # (no `-tags integration`).
      - name: Run unit tests
        run: go test -race -shuffle=on ./...
